name: Vinted deals scanner

# Scanne les catégories Vinted (hors vêtements & chaussures) et alerte sur les
# annonces récentes nettement SOUS le prix du marché (deals à sniper).
# NB : pour du vrai sniping (deals partis en minutes), un VPS en boucle
# (LOOP_ENABLED) avec proxy résidentiel est plus réactif que ce cron.

on:
  schedule:
    - cron: "0 */2 * * *" # toutes les 2 heures
  workflow_dispatch:
    inputs:
      threshold:
        description: "Seuil de réduction sous le marché (0.40 = -40%)"
        type: string
        default: "0.40"

permissions:
  contents: write # committer l'état (dédup des deals déjà alertés)

concurrency:
  group: vinted-deals
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Scanner les affaires Vinted (hors vêtements & chaussures)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VINTED_WEBHOOK || secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: "deals"
          EXCLUDE_PATTERNS: "vêtement,vetement,chaussure,créateur,createur"
          DEAL_THRESHOLD: ${{ github.event.inputs.threshold || '0.40' }}
          DEAL_MAX_AGE_DAYS: "2"
          CONCURRENCY: "4"
        run: python3 vinted_analyzer.py

      - name: Sauvegarder l'état (dédup des deals)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git add state/vinted_deals_state.json
          if git diff --cached --quiet; then
            echo "Aucun changement d'état."
          else
            git commit -m "chore: état deals Vinted [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
